<div class="container">
  <div class="glitch-wrapper">
    <div class="glitch" data-text="404">404</div>
  </div>

  <div class="robot">
    <div class="robot-head">
      <div class="eyes">
        <div class="eye left-eye">
          <div class="pupil"></div>
        </div>
        <div class="eye right-eye">
          <div class="pupil"></div>
        </div>
      </div>
      <div class="mouth">_ _ _</div>
    </div>
    <div class="robot-body">
      <div class="chest-light"></div>
    </div>
    <div class="robot-arms">
      <div class="arm left-arm"></div>
      <div class="arm right-arm"></div>
    </div>
  </div>

  <h1 class="title">გვერდი გაიქცა!</h1>
  <p class="subtitle">ჩვენმა რობოტმა ყველგან ეძება,<br>მაგრამ ეს გვერდი უბრალოდ... <strong>არ არსებობს 👻</strong></p>

  <div class="messages">
    @for (m of messages; track m; let i = $index) {
      <div class="message" [style.animation-delay]="i * 0.3 + 's'">
        {{ m }}
      </div>
    }
  </div>

  <a (click)="goHome()" class="btn">
    🏠 სახლში დაბრუნება
  </a>
</div>
