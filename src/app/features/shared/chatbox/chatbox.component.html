<!-- FAB -->
<button class="chat-fab" [class.open]="isOpen" (click)="toggleChat()">
  @if (!isOpen) {
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  } @else {
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  }
</button>

<!-- Widget -->
<div class="chat-widget" [class.visible]="isOpen">

  <!-- Header -->
  <div class="widget-header">
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="avatar-row">
      <div class="avatar">🧑‍💻</div>
      <div class="avatar">👩‍💼</div>
      <div class="avatar">🤖</div>
    </div>
    <div class="online-label">
      <span class="online-dot"></span> Online ვართ ახლა
    </div>
    <div class="widget-title">გამარჯობა! 👋</div>
    <div class="widget-subtitle">დაგვიწერეთ — 24/7 ვართ აქ!</div>
  </div>

  <!-- Messages -->
  <div class="messages-area" #messagesContainer>
    @for (msg of messages; track $index) {
      <div class="message" [class.user]="msg.role === 'user'" [class.bot]="msg.role === 'bot'">
        @if (msg.html) {
          <div [innerHTML]="msg.html"></div>
        } @else {
          {{ msg.text }}
        }
      </div>
    }
    @if (loading) {
      <div class="message bot typing">
        <span></span><span></span><span></span>
      </div>
    }
  </div>

  <!-- Input -->
  <div class="input-row">
    <input
      class="chat-input"
      type="text"
      placeholder="დაწერეთ შეტყობინება..."
      [(ngModel)]="inputText"
      (keydown)="onEnter($event)"
      [disabled]="loading"
    />
    <button class="send-btn" (click)="sendMessage()" [disabled]="loading || !inputText.trim()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <div class="footer-text">Powered by <span>STEP AI</span></div>
</div>
